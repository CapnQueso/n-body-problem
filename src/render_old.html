<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Orbit Visualizer</title>
    <style>
        body { margin: 0; background: #050505; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(20, 20, 20, 0.9); 
              padding: 20px; border-radius: 12px; border: 1px solid #444; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: #3498db; border: none; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: #2980b9; }
        input[type="file"] { margin-bottom: 10px; font-size: 12px; }
        h3 { margin-top: 0; color: #3498db; }
        .stat { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Simulation UI</h3>
        <div class="stat">1. Run Java Simulation</div>
        <div class="stat">2. Upload <b>positions.txt</b> below:</div>
        <input type="file" id="fileInput" accept=".txt">
        <div id="playback-controls" style="display:none">
            <div class="stat" id="frameCounter">Frame: 0</div>
            <button class="btn" id="playPause">Play / Pause</button>
            <input type="range" id="speed" min="1" max="100" value="10" style="width:100%">
            <div class="stat">Playback Speed</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        class SimulationRenderer {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1e15);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.bodies = [];
                this.scale = 1e-10; // Scales meters to scene units
                
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.camera.position.set(50, 50, 50);
                
                this.scene.add(new THREE.AmbientLight(0x404040, 2));
                this.animate();
            }

            // Spectral Colors from Star.java
            getSpectralColor(char) {
                const colors = { 'O': 0x9bb0ff, 'B': 0xaabfff, 'A': 0xcad7ff, 'F': 0xf8f7ff, 
                                 'G': 0xfff4ea, 'K': 0xffd2a1, 'M': 0xffcc6f };
                return colors[char] || 0xffffff;
            }

            createBody(index) {
                // First body is usually the Star 'Sol' in Simulation.java
                const color = index === 0 ? this.getSpectralColor('G') : 0x3498db;
                const size = index === 0 ? 3 : 1; 

                const geometry = new THREE.SphereGeometry(size, 32, 32);
                const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
                const mesh = new THREE.Mesh(geometry, material);
                
                // History/Trail initialization
                const trailGeom = new THREE.BufferGeometry();
                const trailMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
                const trail = new THREE.Line(trailGeom, trailMat);

                const bodyData = { mesh, trail, history: [] };
                this.bodies.push(bodyData);
                this.scene.add(mesh);
                this.scene.add(trail);
                return bodyData;
            }

            update(line) {
                // Parse: "x y z | x y z | x y z | time"
                const segments = line.split('|').map(s => s.trim().split(/\s+/).filter(v => v !== "").map(Number));
                const time = segments.pop(); // Last item is simulation time

                segments.forEach((coords, i) => {
                    if (coords.length < 3) return;
                    if (!this.bodies[i]) this.createBody(i);

                    const [x, y, z] = coords.map(c => c * this.scale);
                    this.bodies[i].mesh.position.set(x, y, z);

                    // History Trail Logic: Maintain 200 points for the fading path
                    this.bodies[i].history.push(new THREE.Vector3(x, y, z));
                    if (this.bodies[i].history.length > 200) this.bodies[i].history.shift();
                    this.bodies[i].trail.geometry.setFromPoints(this.bodies[i].history);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        const view = new SimulationRenderer();
        let frames = [];
        let currentFrame = 0;
        let playing = false;

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                frames = reader.result.split('\n').filter(l => l.includes('|'));
                document.getElementById('playback-controls').style.display = 'block';
                playing = true;
                playLoop();
            };
            reader.readAsText(e.target.files[0]);
        };

        function playLoop() {
            if (!playing || currentFrame >= frames.length) return;
            
            view.update(frames[currentFrame]);
            document.getElementById('frameCounter').innerText = `Frame: ${currentFrame}`;
            
            const speed = 101 - document.getElementById('speed').value;
            currentFrame++;
            setTimeout(playLoop, speed);
        }

        document.getElementById('playPause').onclick = () => { playing = !playing; if(playing) playLoop(); };
    </script>
</body>
</html>
